# Thin per-repo caller for the shared `/btbai` pipeline.
#
# This file is a TEMPLATE, not an active workflow: once btoddb/btb-pipeline
# exists and is tagged v1, copy this into a consuming repo's
# `.github/workflows/btb-client.yml` (replacing whatever is there), fill in the
# `with:` block for that repo, and keep repo-specific agent guidance in that
# repo's own CLAUDE.md / AGENTS.md / ai-rules files. The shared /btbai command
# contract is injected by the reusable workflow at runtime.
#
# Event triggers and concurrency MUST live in the caller — a reusable workflow
# can't be the event entry point.

name: BTB Pipeline

on:
    issue_comment:
        types: [created]
    pull_request_review_comment:
        types: [created]
    issues:
        types: [opened, assigned]
    pull_request_review:
        types: [submitted]

concurrency:
    group: btb-${{ github.event.issue.number && 'iss' || 'pull' }}-${{ github.event.issue.number || github.event.pull_request.number }}
    cancel-in-progress: false

jobs:
    btb:
        uses: btoddb/btb-pipeline/.github/workflows/btb.yml@v1
        permissions:
            contents: write
            pull-requests: write
            issues: write
            id-token: write
            actions: read
        secrets:
            CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
            maintainer: btoddb
            setup: python # or "node" / "none"
            python-version: "3.14"
            install-command: pip install -r requirements.txt
            #plan-allowed-tools: ""
            implement-allowed-tools: "Bash(scripts/deploy-card),Bash(npm *)"
            #review-allowed-tools: ""
